<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Login Page</title>

    <!-- Icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="bg-base-200 h-auto py-7">
    <section class="bg-base-100 w-[75%] sm:w-[61%] md:w-[51%] lg:w-[31%] mx-auto rounded-xl shadow-xl p-8 space-y-6">

        <!-- logo heading para -->
        <div class="flex flex-col items-center justify-center">
            <div><img src="./assets/github-logo.png" alt=""></div>
            <h2 class="font-bold text-2xl mt-6 mb-1">GitHub Issues Tracker</h2>
            <p class="opacity-60">Sign in to manage your issues</p>
        </div>

        <!-- email pass -->
        <fieldset class="fieldset w-full rounded-box p-4 space-y-3">
            <div class="space-y-1">
                <label class="label font-extrabold">Username</label>
                <input id="usernameInput" type="text" class="input w-full rounded-lg" placeholder="Enter Username" />
                <p class="text-[#4A00FF]">Default: admin</p>
            </div>

            <div class="space-y-1">
                <label class="label font-extrabold">Password</label>
                <input id="passInput" type="password" class="input w-full rounded-lg" placeholder="Password" />
                <p class="text-[#4A00FF]">Default: admin123</p>
            </div>
        </fieldset>
        

        <!-- Login btn -->
         <button id="signInBtn" class="btn btn-primary w-full">Sign In</button>

         <!-- or -->
          <div class="flex items-center gap-1 w-full mx-auto">
            <hr class="flex-grow  opacity-40 items-center">
            <span class="px-2">OR</span>
            <hr class="flex-grow opacity-40">
          </div>

          <!-- Demo Credentials -->
           <div class="flex flex-col justify-center items-center space-y-5">
            <p class="opacity-50">Demo Credentials:</p>
            <div class=" flex flex-col justify-center items-center bg-base-200 w-full py-3">
                <p class=""><span class="font-bold">Username:</span> admin</p>
                <p class=""><span class="font-bold">Password:</span> admin123</p>
            </div>
           </div>

    </section>


    <script src="./script/login.js"></script>
</body>
</html>
