<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- Icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Tailwind and DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-300 h-[100vh]">

    <nav class="bg-white flex flex-col sm:flex-row items-center justify-between gap-3 md:px-10 lg:px-20 py-5 shadow-sm">
        <!-- Left  -->
        <div class="flex gap-1 items-center">
            <div class=" w-9 md:w-10"><img src="./assets/github-logo.png" alt=""></div>
            <h2 class="font-semibold text-xl md:text-2xl">GitHub Issues Tracker</h2>
        </div>

        <!-- Right -->
         <div class="join flex justify-center items-center gap-2">
            <div class="">
                <label class="input validator join-item relative ">
                    <input class="rounded-xl pl-6 " type="text" placeholder="search issues..."/>
                    <span class="absolute opacity-45  "><i class='fa-brands fa-sistrix'></i></span>
                </label>
            </div>
            <button class="btn btn-primary join-item">+ New Issue</button>
         </div>
    </nav>


    <main class="bg-base-300 w-10/12 mx-auto mb-4 mt-16">

        <!-- all, open, and close tab buttons -->
        <section class="flex bg-white gap-2 px-6 py-4 rounded-xl">
            <button class="btn btn-primary w-26">All</button>
            <button class="btn w-26">Open</button>
            <button class="btn w-26">Close</button>
        </section>
    </main>

</body>
</html>
