<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-base-300 min-h-screen">

    <nav class="bg-white flex flex-col sm:flex-row items-center justify-between gap-3 md:px-10 lg:px-20 py-5 shadow-sm">
        <!-- Left  -->
        <div class="flex gap-1 items-center">
            <div class=" w-9 md:w-10"><img src="./assets/github-logo.png" alt=""></div>
            <h2 class="font-semibold text-xl md:text-2xl">GitHub Issues Tracker</h2>
        </div>

        <!-- Right -->
        <div class="join flex justify-center items-center gap-2">
            <div class="">
                <label class="input validator join-item relative ">
                    <input id="issuesSearch" class="rounded-xl pl-6 " type="text" placeholder="search issues..." />
                    <span class="absolute opacity-45  "><i class='fa-brands fa-sistrix'></i></span>
                </label>
            </div>
            <button id="issueBtn" class="btn btn-primary join-item text-sm">+ New Issue</button>
        </div>
    </nav>


    <main class="bg-base-300 w-full sm:w-10/12 mx-auto mt-16">

        <!-- all, open, and close tab buttons -->
        <section class="flex bg-white gap-2 px-1 sm:px-6 py-4 rounded-xl mb-4">
            <button onclick="tabSwitchingStyle ('all')" id="all" class="text-xs btn btn-primary w-26">All</button>
            <button onclick="tabSwitchingStyle ('open')" id="open" class="text-xs btn w-26">Open</button>
            <button onclick="tabSwitchingStyle ('close')" id="close" class="text-xs btn w-26">Close</button>
        </section>


        <!-- Issues -->
        <section class="bg-base-100 rounded-xl">

            <!-- Issue quantity -->
            <div class="bg-white p-2 sm:p-6 rounded-lg flex justify-between items-center shadow-lg">
                <!-- Left -->
                <div class="flex gap-2 items-center ">
                    <!-- ing -->
                    <div class="bg-base-300 rounded-full w-fit p-2">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <!-- isuues -->
                    <div class="">
                        <h3 class="text-base font-semibold"><span id="issueCount">50</span> Issues</h3>
                        <p class="text-sm opacity-55">Track and manage your project issues</p>
                    </div>

                </div>

                <!-- Right -->
                <div class="flex justify-center items-center gap-4">
                    <div class="flex justify-center gap-1 items-center">
                        <div class="rounded-full p-1.5 w-1 bg-[#00A96E]"></div>
                        <p class="text-sm">Open</p>
                    </div>
                    <div class="flex justify-center items-center gap-1 ">
                        <div class=" rounded-full p-1.5 w-1 bg-[#A855F7]"></div>
                        <p class="text-sm">Close</p>
                    </div>
                </div>
            </div>

            <!-- All Issue Cards -->
            <div id="issueCards"
                class="m-6 bg-white grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"> </div>

            <!-- Open isuue cards -->
            <div id="openIssueCards"
                class="m-6 bg-white grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"> </div>

            <!-- Closed issue cards -->
            <div id="closeIssueCards"
                class="m-6 bg-white grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"> </div>

            <!-- modal -->
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div class="modal-box p-8">

                    <div id="issueDetails"> </div>
                </div>

            </dialog>

        </section>
    </main>


    <script src="./script/issues.js"></script>
</body>

</html>
